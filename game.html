<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game – Housie Party</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #6C2BD9;
      --purple-dark: #4A1A9E;
      --purple-light: #9B5EF5;
      --gold: #F5C518;
      --gold-dark: #D4A800;
      --white: #FFFFFF;
      --text: #1A0A3B;
      --card-bg: rgba(255,255,255,0.07);
      --card-border: rgba(255,255,255,0.12);
      --marked: #9B5EF5;
      --called: #F5C518;
    }

    html, body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background: var(--purple-dark);
      color: var(--white);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #7C3AED44 0%, transparent 60%),
                  linear-gradient(180deg, #4A1A9E 0%, #1A0A3B 100%);
      z-index: 0;
    }

    .page { position: relative; z-index: 1; }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1rem 0.5rem;
      gap: 0.5rem;
    }

    .room-badge {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 0.4rem 0.8rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: var(--gold);
    }

    .logo-small {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 1px;
      color: var(--white);
      opacity: 0.7;
    }

    .players-badge {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 0.4rem 0.8rem;
      font-size: 0.78rem;
      font-weight: 800;
      color: #C4B0E8;
    }

    /* ── CURRENT NUMBER ── */
    .number-section {
      padding: 0.8rem 1rem;
      text-align: center;
    }

    .current-number-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
    }

    .current-label {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #C4B0E8;
      margin-bottom: 0.3rem;
    }

    .current-number {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: var(--text);
      box-shadow: 0 0 30px rgba(245,197,24,0.5);
      animation: popNumber 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }

    @keyframes popNumber {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .numbers-called {
      font-size: 0.72rem;
      color: #7B6FA0;
      font-weight: 700;
      margin-top: 0.4rem;
    }

    /* Recent numbers row */
    .recent-numbers {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0.3rem 1rem;
    }

    .recent-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(245,197,24,0.15);
      border: 1px solid rgba(245,197,24,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      color: var(--gold);
    }

    /* ── HOST CONTROLS ── */
    .host-controls {
      padding: 0.5rem 1rem;
      display: flex;
      gap: 0.6rem;
    }

    .btn-next {
      flex: 1;
      padding: 0.9rem;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(245,197,24,0.3);
      transition: all 0.15s;
    }

    .btn-next:active { transform: scale(0.97); }
    .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-pause {
      width: 50px;
      border-radius: 14px;
      border: 2px solid var(--card-border);
      background: var(--card-bg);
      color: var(--white);
      font-size: 1.2rem;
      cursor: pointer;
    }

    /* Auto timer bar */
    .timer-bar-wrap {
      padding: 0 1rem;
      display: none;
    }

    .timer-bar-wrap.show { display: block; }

    .timer-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .timer-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width linear;
    }

    /* ── NUMBERS BOARD (host view) ── */
    .numbers-board {
      padding: 0.5rem 1rem;
    }

    .board-label {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #7B6FA0;
      margin-bottom: 0.4rem;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
    }

    .board-cell {
      aspect-ratio: 1;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.7rem;
      background: rgba(255,255,255,0.06);
      color: #7B6FA0;
      transition: all 0.3s;
    }

    .board-cell.called {
      background: var(--gold);
      color: var(--text);
      box-shadow: 0 0 6px rgba(245,197,24,0.4);
    }

    /* ── TICKET ── */
    .tickets-section {
      padding: 0.5rem 1rem;
    }

    .ticket-tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.6rem;
    }

    .ticket-tab {
      padding: 0.3rem 0.8rem;
      border-radius: 8px;
      border: 2px solid var(--card-border);
      background: transparent;
      color: #7B6FA0;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ticket-tab.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(245,197,24,0.1);
    }

    .ticket-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 0.8rem;
      display: none;
    }

    .ticket-card.show { display: block; }

    .ticket-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 4px;
    }

    .ticket-cell {
      aspect-ratio: 1;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      font-weight: bold;
      transition: all 0.2s;
      position: relative;
    }

    .ticket-cell.number {
      background: rgba(255,255,255,0.1);
      color: var(--white);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .ticket-cell.number:active { transform: scale(0.92); }

    .ticket-cell.blank {
      background: transparent;
    }

    .ticket-cell.marked {
      background: var(--marked);
      color: var(--white);
      box-shadow: 0 0 10px rgba(155,94,245,0.5);
      border-color: var(--marked);
    }

    .ticket-cell.called-not-marked {
      background: rgba(245,197,24,0.2);
      color: var(--gold);
      border-color: rgba(245,197,24,0.4);
      animation: glow 1s ease infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 4px rgba(245,197,24,0.3); }
      to { box-shadow: 0 0 12px rgba(245,197,24,0.7); }
    }

    /* ── CLAIM BUTTON ── */
    .claim-section {
      padding: 0.5rem 1rem;
      display: flex;
      gap: 0.6rem;
    }

    .btn-claim {
      flex: 1;
      padding: 0.9rem;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #FF6B35 0%, #FF4500 100%);
      color: var(--white);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,107,53,0.4);
      transition: all 0.15s;
    }

    .btn-claim:active { transform: scale(0.97); }

    /* Reactions */
    .reactions {
      display: flex;
      gap: 0.4rem;
    }

    .reaction-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 2px solid var(--card-border);
      background: var(--card-bg);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .reaction-btn:active { transform: scale(0.85); }

    /* Floating reaction */
    .floating-reaction {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      z-index: 999;
      animation: floatUp 1.5s ease forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
    }

    /* ── WINNERS SIDEBAR ── */
    .winners-section {
      padding: 0.5rem 1rem 1rem;
    }

    .winners-label {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #7B6FA0;
      margin-bottom: 0.4rem;
    }

    .winners-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .winner-chip {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(245,197,24,0.1);
      border: 1px solid rgba(245,197,24,0.25);
      border-radius: 10px;
      padding: 0.5rem 0.8rem;
      animation: popIn 0.4s ease;
    }

    .winner-pattern {
      font-size: 0.7rem;
      color: var(--gold);
      font-weight: 800;
    }

    .winner-name {
      font-size: 0.85rem;
      font-weight: 800;
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* ── OVERLAY: Winner announce ── */
    .winner-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,10,59,0.9);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
      backdrop-filter: blur(8px);
    }

    .winner-overlay.show { display: flex; animation: fadeIn 0.4s ease; }

    .winner-overlay-emoji { font-size: 4rem; animation: bounce 0.8s ease infinite; }
    .winner-overlay-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--gold);
      letter-spacing: 2px;
    }
    .winner-overlay-name { font-size: 1.3rem; font-weight: 800; }
    .winner-overlay-pattern {
      font-size: 1rem;
      color: #C4B0E8;
      font-weight: 700;
    }

    .btn-overlay-ok {
      padding: 0.9rem 2.5rem;
      border-radius: 14px;
      border: none;
      background: var(--gold);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    /* ── OVERLAY: Results ── */
    .results-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,10,59,0.95);
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
      gap: 1rem;
      overflow-y: auto;
      backdrop-filter: blur(12px);
    }

    .results-overlay.show { display: flex; animation: fadeIn 0.5s ease; }

    .results-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--gold);
      letter-spacing: 2px;
      text-align: center;
    }

    .results-winners {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .results-winner-card {
      background: rgba(245,197,24,0.1);
      border: 2px solid rgba(245,197,24,0.3);
      border-radius: 14px;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .results-trophy { font-size: 2rem; }

    .results-winner-info { flex: 1; }
    .results-winner-name { font-size: 1.1rem; font-weight: 800; }
    .results-winner-pat { font-size: 0.8rem; color: var(--gold); font-weight: 700; }

    .results-timer {
      font-size: 0.85rem;
      color: #7B6FA0;
      font-weight: 700;
    }

    .results-btns {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      width: 100%;
      max-width: 400px;
    }

    .btn-play-again {
      padding: 1rem;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-end-room {
      padding: 1rem;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #C4B0E8;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    /* Invalid claim shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .shake { animation: shake 0.4s ease; }

    .btn-exit {
      padding: 0.35rem 0.7rem;
      border-radius: 8px;
      border: 2px solid rgba(255,100,100,0.4);
      background: rgba(255,100,100,0.1);
      color: #FF8080;
      font-family: 'Nunito', sans-serif;
      font-size: 0.75rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-exit:active { background: rgba(255,100,100,0.25); }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="room-badge" id="roomBadge">------</div>
    <div class="logo-small">🎱 HOUSIE</div>
    <button class="btn-exit" onclick="exitGame()">✕ Exit</button>
  </div>
  <div style="text-align:center;padding:0 1rem 0.3rem;font-size:0.72rem;color:#7B6FA0;font-weight:700;">
    <span id="playersBadge">0 players</span>
  </div>

  <!-- CURRENT NUMBER -->
  <div class="number-section">
    <div class="current-number-wrap">
      <div class="current-label">Current Number</div>
      <div class="current-number" id="currentNum">--</div>
      <div class="numbers-called" id="calledCount">0 / 90 numbers called</div>
    </div>
  </div>

  <!-- Recent numbers -->
  <div class="recent-numbers" id="recentNumbers"></div>

  <!-- Timer bar (auto mode) -->
  <div class="timer-bar-wrap" id="timerBarWrap">
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
  </div>

  <!-- HOST CONTROLS -->
  <div class="host-controls" id="hostControls" style="display:none">
    <button class="btn-next" id="btnNext" onclick="drawNumber()">🎱 Next Number</button>
    <button class="btn-pause" id="btnPause" onclick="togglePause()" title="Pause/Resume">⏸️</button>
  </div>

  <!-- NUMBERS BOARD (host) -->
  <div class="numbers-board" id="numbersBoard" style="display:none">
    <div class="board-label">All Numbers</div>
    <div class="board-grid" id="boardGrid"></div>
  </div>

  <!-- TICKETS (player) -->
  <div class="tickets-section" id="ticketsSection" style="display:none">
    <div class="ticket-tabs" id="ticketTabs"></div>
    <div id="ticketCards"></div>
  </div>

  <!-- CLAIM (player) -->
  <div class="claim-section" id="claimSection" style="display:none">
    <button class="btn-claim" onclick="claimWin()">🏆 Tambola!</button>
    <div class="reactions">
      <button class="reaction-btn" onclick="sendReaction('🎉')">🎉</button>
      <button class="reaction-btn" onclick="sendReaction('😱')">😱</button>
      <button class="reaction-btn" onclick="sendReaction('🔥')">🔥</button>
    </div>
  </div>

  <!-- REACTIONS (host) -->
  <div class="claim-section" id="hostReactions" style="display:none">
    <div class="reactions" style="width:100%; justify-content:center;">
      <button class="reaction-btn" onclick="sendReaction('🎉')">🎉</button>
      <button class="reaction-btn" onclick="sendReaction('😱')">😱</button>
      <button class="reaction-btn" onclick="sendReaction('🔥')">🔥</button>
      <button class="reaction-btn" onclick="sendReaction('👑')">👑</button>
    </div>
  </div>

  <!-- WINNERS -->
  <div class="winners-section">
    <div class="winners-label">Winners So Far</div>
    <div class="winners-list" id="winnersList">
      <div style="color:#7B6FA0; font-size:0.82rem;">No winners yet...</div>
    </div>
  </div>

</div>

<!-- WINNER ANNOUNCE OVERLAY -->
<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-overlay-emoji">🏆</div>
  <div class="winner-overlay-title" id="overlayTitle">WINNER!</div>
  <div class="winner-overlay-name" id="overlayName"></div>
  <div class="winner-overlay-pattern" id="overlayPattern"></div>
  <button class="btn-overlay-ok" onclick="closeWinnerOverlay()">Continue Playing 🎱</button>
</div>

<!-- RESULTS OVERLAY -->
<div class="results-overlay" id="resultsOverlay">
  <div style="font-size:3rem">🎊</div>
  <div class="results-title">Game Over!</div>
  <div class="results-winners" id="resultsWinners"></div>
  <div class="results-timer" id="resultsTimer">Closing in 60s...</div>
  <div class="results-btns" id="resultsBtns"></div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, update, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD8FK8uA47FYgquE9XpNTAE5SM7iUAmrO8",
    authDomain: "housie-party.firebaseapp.com",
    databaseURL: "https://housie-party-default-rtdb.firebaseio.com",
    projectId: "housie-party",
    storageBucket: "housie-party.firebasestorage.app",
    messagingSenderId: "936166289642",
    appId: "1:936166289642:web:8b8bf76161a68058966793"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ── URL params ──
  const params = new URLSearchParams(location.search);
  const roomCode = params.get('code');
  const role = params.get('role'); // 'host' or 'player'
  const playerId = params.get('pid');

  if (!roomCode) { location.href = 'index.html'; }

  document.getElementById('roomBadge').textContent = roomCode;

  // ── State ──
  let roomData = null;
  let calledNumbers = [];
  let winners = {};
  let myTickets = [];
  let myMarkedNumbers = [];
  let markingMode = sessionStorage.getItem('markingMode') || 'manual';
  let currentTicketIndex = 0;
  let autoTimer = null;
  let isPaused = false;
  let gameEnded = false;
  let seenWinners = new Set();
  let patterns = {};

  // Pattern names
  const patternNames = {
    early5: '🎯 Early Five',
    topline: '⬆️ Top Line',
    midline: '➡️ Middle Line',
    botline: '⬇️ Bottom Line',
    fullhouse: '🏆 Full House'
  };

  // ── Init ──
  async function init() {
    const snap = await get(ref(db, `rooms/${roomCode}`));
    if (!snap.exists()) { alert('Room not found!'); location.href = 'index.html'; return; }

    roomData = snap.val();
    patterns = roomData.patterns || {};
    calledNumbers = roomData.numbers || [];

    if (role === 'host') {
      initHost();
    } else {
      initPlayer();
    }

    // Listen for updates
    listenGame();
  }

  // ── HOST INIT ──
  function initHost() {
    document.getElementById('hostControls').style.display = 'flex';
    document.getElementById('numbersBoard').style.display = 'block';
    document.getElementById('hostReactions').style.display = 'flex';

    // Build board
    const grid = document.getElementById('boardGrid');
    for (let i = 1; i <= 90; i++) {
      const cell = document.createElement('div');
      cell.className = 'board-cell';
      cell.textContent = i;
      cell.id = `cell-${i}`;
      grid.appendChild(cell);
    }

    // Already called
    calledNumbers.forEach(n => {
      const el = document.getElementById(`cell-${n}`);
      if (el) el.classList.add('called');
    });

    // Auto mode
    if (roomData.announceMode === 'auto' && !isPaused) {
      document.getElementById('timerBarWrap').classList.add('show');
      document.getElementById('btnNext').style.display = 'none';
      startAutoTimer();
    } else {
      document.getElementById('btnPause').style.display = 'none';
    }

    updateCurrentNumber();
  }

  // ── PLAYER INIT ──
  function initPlayer() {
    document.getElementById('ticketsSection').style.display = 'block';
    document.getElementById('claimSection').style.display = 'flex';

    // Get player data
    const players = roomData.players || {};
    const me = players[playerId];
    if (!me) { alert('Player data not found!'); location.href = 'index.html'; return; }

    myTickets = me.tickets || [];
    myMarkedNumbers = me.markedNumbers || [];
    markingMode = me.markingMode || 'manual';

    renderTickets();
    updateCurrentNumber();
  }

  // ── RENDER TICKETS ──
  function renderTickets() {
    const tabs = document.getElementById('ticketTabs');
    const cards = document.getElementById('ticketCards');
    tabs.innerHTML = '';
    cards.innerHTML = '';

    myTickets.forEach((ticket, ti) => {
      // Tab
      const tab = document.createElement('button');
      tab.className = `ticket-tab ${ti === 0 ? 'active' : ''}`;
      tab.textContent = `Ticket ${ti + 1}`;
      tab.onclick = () => switchTicket(ti);
      tabs.appendChild(tab);

      // Card
      const card = document.createElement('div');
      card.className = `ticket-card ${ti === 0 ? 'show' : ''}`;
      card.id = `ticket-card-${ti}`;

      const grid = document.createElement('div');
      grid.className = 'ticket-grid';

      ticket.forEach((row, ri) => {
        row.forEach((num, ci) => {
          const cell = document.createElement('div');
          if (num === 0) {
            cell.className = 'ticket-cell blank';
          } else {
            const isCalled = calledNumbers.includes(num);
            const isMarked = myMarkedNumbers.includes(num);
            cell.className = `ticket-cell number${isMarked ? ' marked' : isCalled ? ' called-not-marked' : ''}`;
            cell.textContent = num;
            cell.dataset.num = num;
            cell.dataset.ti = ti;

            if (markingMode === 'manual') {
              cell.onclick = () => markNumber(num, ti, cell);
            }
          }
          grid.appendChild(cell);
        });
      });

      card.appendChild(grid);
      cards.appendChild(card);
    });

    if (myTickets.length <= 1) tabs.style.display = 'none';
  }

  function switchTicket(i) {
    currentTicketIndex = i;
    document.querySelectorAll('.ticket-tab').forEach((t, ti) => t.classList.toggle('active', ti === i));
    document.querySelectorAll('.ticket-card').forEach((c, ci) => c.classList.toggle('show', ci === i));
  }

  // ── MARK NUMBER ──
  async function markNumber(num, ticketIdx, cell) {
    if (myMarkedNumbers.includes(num)) return; // Already marked

    myMarkedNumbers.push(num);
    cell.classList.remove('called-not-marked');
    cell.classList.add('marked');

    // Save to Firebase
    await update(ref(db, `rooms/${roomCode}/players/${playerId}`), {
      markedNumbers: myMarkedNumbers
    });
  }

  // ── DRAW NUMBER (host) ──
  window.drawNumber = async function() {
    if (gameEnded) return;
    const remaining = [];
    for (let i = 1; i <= 90; i++) {
      if (!calledNumbers.includes(i)) remaining.push(i);
    }
    if (remaining.length === 0) { endGame(); return; }

    const num = remaining[Math.floor(Math.random() * remaining.length)];
    calledNumbers.push(num);

    await update(ref(db, `rooms/${roomCode}`), { numbers: calledNumbers });

    // Mark board
    const el = document.getElementById(`cell-${num}`);
    if (el) el.classList.add('called');

    updateCurrentNumber();

    // Auto-mark players who have auto mode
    autoMarkPlayers(num);

    if (remaining.length === 1) { endGame(); }
  };

  async function autoMarkPlayers(num) {
    const snap = await get(ref(db, `rooms/${roomCode}/players`));
    const players = snap.val() || {};
    for (const [pid, player] of Object.entries(players)) {
      if (player.markingMode !== 'auto') continue;
      const marked = player.markedNumbers || [];
      // Check if num is on any of their tickets
      let found = false;
      (player.tickets || []).forEach(ticket => {
        ticket.forEach(row => { if (row.includes(num)) found = true; });
      });
      if (found && !marked.includes(num)) {
        marked.push(num);
        await update(ref(db, `rooms/${roomCode}/players/${pid}`), { markedNumbers: marked });
      }
    }
  }

  // ── AUTO TIMER ──
  function startAutoTimer() {
    if (isPaused || gameEnded) return;
    const duration = roomData.speed || 5000;
    const fill = document.getElementById('timerFill');
    fill.style.transition = 'none';
    fill.style.width = '100%';

    setTimeout(() => {
      fill.style.transition = `width ${duration}ms linear`;
      fill.style.width = '0%';
    }, 50);

    autoTimer = setTimeout(() => {
      drawNumber();
      if (!gameEnded && !isPaused) startAutoTimer();
    }, duration);
  }

  window.togglePause = function() {
    isPaused = !isPaused;
    document.getElementById('btnPause').textContent = isPaused ? '▶️' : '⏸️';
    if (!isPaused) startAutoTimer();
    else { clearTimeout(autoTimer); document.getElementById('timerFill').style.transition = 'none'; }
  };

  // ── UPDATE UI ──
  function updateCurrentNumber() {
    const last = calledNumbers[calledNumbers.length - 1];
    const el = document.getElementById('currentNum');
    el.textContent = last || '--';
    el.style.animation = 'none';
    setTimeout(() => el.style.animation = '', 10);

    document.getElementById('calledCount').textContent = `${calledNumbers.length} / 90 numbers called`;

    // Recent 5
    const recent = calledNumbers.slice(-6, -1).reverse();
    document.getElementById('recentNumbers').innerHTML =
      recent.map(n => `<div class="recent-num">${n}</div>`).join('');
  }

  // ── LISTEN GAME ──
  function listenGame() {
    // Numbers
    onValue(ref(db, `rooms/${roomCode}/numbers`), (snap) => {
      const nums = snap.val() || [];
      calledNumbers = nums;
      updateCurrentNumber();

      if (role === 'player') {
        // Auto-mark
        if (markingMode === 'auto') {
          nums.forEach(n => { if (!myMarkedNumbers.includes(n)) myMarkedNumbers.push(n); });
        }
        // Update ticket cells
        document.querySelectorAll('.ticket-cell.number').forEach(cell => {
          const num = parseInt(cell.dataset.num);
          const isMarked = myMarkedNumbers.includes(num);
          const isCalled = nums.includes(num);
          cell.className = `ticket-cell number${isMarked ? ' marked' : isCalled ? ' called-not-marked' : ''}`;
        });
      }

      if (role === 'host') {
        document.querySelectorAll('.board-cell').forEach(cell => {
          const n = parseInt(cell.textContent);
          cell.classList.toggle('called', nums.includes(n));
        });
      }
    });

    // Players count
    onValue(ref(db, `rooms/${roomCode}/players`), (snap) => {
      const players = snap.val() || {};
      const count = Object.keys(players).length;
      document.getElementById('playersBadge').textContent = `${count} player${count !== 1 ? 's' : ''}`;
    });

    // Winners
    onValue(ref(db, `rooms/${roomCode}/winners`), (snap) => {
      winners = snap.val() || {};
      renderWinners();
    });

    // Reactions
    onValue(ref(db, `rooms/${roomCode}/reactions`), (snap) => {
      const r = snap.val();
      if (r) showFloatingReaction(r.emoji);
    });

    // Game status
    onValue(ref(db, `rooms/${roomCode}/status`), (snap) => {
      if (snap.val() === 'ended' && !gameEnded) {
        gameEnded = true;
        showResults();
      }
      if (snap.val() === 'waiting') {
        location.href = `game.html?code=${roomCode}&role=${role}&pid=${playerId || ''}`;
      }
    });
  }

  // ── CLAIM WIN ──
  window.claimWin = async function() {
    const snap = await get(ref(db, `rooms/${roomCode}/players/${playerId}`));
    const me = snap.val();
    if (!me) return;

    const marked = me.markedNumbers || [];
    const tickets = me.tickets || [];

    // Fresh data from Firebase
    const numsSnap = await get(ref(db, `rooms/${roomCode}/numbers`));
    const called = numsSnap.val() || [];
    const winSnap = await get(ref(db, `rooms/${roomCode}/winners`));
    const existingWinners = winSnap.val() || {};

    let claimedPattern = null;

    // Check each pattern
    const checks = {
      early5: () => {
        if (existingWinners['early5']) return false;
        return patterns.early5 && marked.filter(n => called.includes(n)).length >= 5;
      },
      topline: () => {
        if (existingWinners['topline']) return false;
        if (!patterns.topline) return false;
        return tickets.some(ticket =>
          ticket[0].filter(n => n > 0).every(n => marked.includes(n) && called.includes(n))
        );
      },
      midline: () => {
        if (existingWinners['midline']) return false;
        if (!patterns.midline) return false;
        return tickets.some(ticket =>
          ticket[1].filter(n => n > 0).every(n => marked.includes(n) && called.includes(n))
        );
      },
      botline: () => {
        if (existingWinners['botline']) return false;
        if (!patterns.botline) return false;
        return tickets.some(ticket =>
          ticket[2].filter(n => n > 0).every(n => marked.includes(n) && called.includes(n))
        );
      },
      fullhouse: () => {
        if (existingWinners['fullhouse']) return false;
        if (!patterns.fullhouse) return false;
        return tickets.some(ticket =>
          ticket.flat().filter(n => n > 0).every(n => marked.includes(n) && called.includes(n))
        );
      }
    };

    for (const [pat, check] of Object.entries(checks)) {
      if (check()) { claimedPattern = pat; break; }
    }

    if (!claimedPattern) {
      // Invalid claim
      const btn = document.querySelector('.btn-claim');
      btn.classList.add('shake');
      btn.textContent = '❌ Not valid!';
      setTimeout(() => { btn.classList.remove('shake'); btn.textContent = '🏆 Tambola!'; }, 1500);
      return;
    }

    // Save winner
    await update(ref(db, `rooms/${roomCode}/winners/${claimedPattern}`), {
      name: me.name,
      playerId,
      pattern: claimedPattern,
      timestamp: Date.now()
    });

    // Check if all patterns won
    const updatedSnap = await get(ref(db, `rooms/${roomCode}/winners`));
    const updatedWinners = updatedSnap.val() || {};
    const activePatterns = Object.keys(patterns).filter(k => patterns[k]);
    if (activePatterns.every(p => updatedWinners[p])) {
      await update(ref(db, `rooms/${roomCode}`), { status: 'ended' });
    }
  };

  // ── RENDER WINNERS ──
  function renderWinners() {
    const list = document.getElementById('winnersList');
    const entries = Object.entries(winners);

    if (entries.length === 0) {
      list.innerHTML = '<div style="color:#7B6FA0; font-size:0.82rem;">No winners yet...</div>';
      return;
    }

    list.innerHTML = entries.map(([pat, w]) =>
      `<div class="winner-chip">
        🏆
        <div>
          <div class="winner-pattern">${patternNames[pat] || pat}</div>
          <div class="winner-name">${w.name}</div>
        </div>
      </div>`
    ).join('');

    // Show overlay for new winners
    entries.forEach(([pat, w]) => {
      if (!seenWinners.has(pat)) {
        seenWinners.add(pat);
        showWinnerOverlay(w.name, patternNames[pat]);
      }
    });
  }

  function showWinnerOverlay(name, pattern) {
    document.getElementById('overlayName').textContent = name;
    document.getElementById('overlayPattern').textContent = pattern;
    document.getElementById('winnerOverlay').classList.add('show');
  }

  window.closeWinnerOverlay = function() {
    document.getElementById('winnerOverlay').classList.remove('show');
  };

  // ── REACTIONS ──
  window.sendReaction = async function(emoji) {
    await set(ref(db, `rooms/${roomCode}/reactions`), {
      emoji,
      ts: Date.now()
    });
  };

  function showFloatingReaction(emoji) {
    const el = document.createElement('div');
    el.className = 'floating-reaction';
    el.textContent = emoji;
    el.style.left = (20 + Math.random() * 60) + 'vw';
    el.style.bottom = '20vh';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }

  // ── END GAME ──
  async function endGame() {
    if (gameEnded) return;
    gameEnded = true;
    clearTimeout(autoTimer);
    await update(ref(db, `rooms/${roomCode}`), { status: 'ended' });
    showResults();
  }

  function showResults() {
    clearTimeout(autoTimer);
    const overlay = document.getElementById('resultsOverlay');
    overlay.classList.add('show');

    // Winners list
    const container = document.getElementById('resultsWinners');
    const entries = Object.entries(winners);
    container.innerHTML = entries.length === 0
      ? '<div style="color:#7B6FA0;">No winners this round!</div>'
      : entries.map(([pat, w]) => `
          <div class="results-winner-card">
            <div class="results-trophy">🏆</div>
            <div class="results-winner-info">
              <div class="results-winner-name">${w.name}</div>
              <div class="results-winner-pat">${patternNames[pat] || pat}</div>
            </div>
          </div>`).join('');

    // Host buttons
    const btns = document.getElementById('resultsBtns');
    if (role === 'host') {
      btns.innerHTML = `
        <button class="btn-play-again" onclick="playAgain()">🔄 Play Again</button>
        <button class="btn-end-room" onclick="endRoom()">🚪 End Room</button>`;
    } else {
      btns.innerHTML = `<div style="color:#7B6FA0; font-size:0.85rem;">Waiting for host...</div>`;
    }

    // 60s countdown
    let secs = 60;
    const timerEl = document.getElementById('resultsTimer');
    const countdown = setInterval(() => {
      secs--;
      timerEl.textContent = `Closing in ${secs}s...`;
      if (secs <= 0) {
        clearInterval(countdown);
        if (role === 'host') endRoom();
        else location.href = 'index.html';
      }
    }, 1000);
  }

  // ── PLAY AGAIN ──
  window.playAgain = async function() {
    await update(ref(db, `rooms/${roomCode}`), {
      status: 'waiting',
      numbers: [],
      winners: {}
    });
    // Reset player marked numbers
    const snap = await get(ref(db, `rooms/${roomCode}/players`));
    const players = snap.val() || {};
    for (const pid of Object.keys(players)) {
      await update(ref(db, `rooms/${roomCode}/players/${pid}`), { markedNumbers: [] });
    }
    location.href = `host.html`;
  };

  // ── END ROOM ──
  window.endRoom = async function() {
    await remove(ref(db, `rooms/${roomCode}`));
    location.href = 'index.html';
  };

  // ── EXIT GAME ──
  window.exitGame = async function() {
    if (role === 'host') {
      const confirm = window.confirm('End game for everyone?');
      if (!confirm) return;
      await update(ref(db, \`rooms/\${roomCode}\`), { status: 'ended' });
      await remove(ref(db, \`rooms/\${roomCode}\`));
      location.href = 'index.html';
    } else {
      const confirm = window.confirm('Leave the game?');
      if (!confirm) return;
      await remove(ref(db, \`rooms/\${roomCode}/players/\${playerId}\`));
      location.href = 'index.html';
    }
  };

  init();
</script>
