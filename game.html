<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game – Housie Party</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple-dark: #1A0A3B;
      --purple: #4A1A9E;
      --purple-light: #9B5EF5;
      --gold: #F5C518;
      --gold-dark: #D4A800;
      --white: #FFFFFF;
      --text: #1A0A3B;
      --card-bg: rgba(255,255,255,0.07);
      --card-border: rgba(255,255,255,0.12);
    }
    html, body { min-height: 100vh; font-family: 'Nunito', sans-serif; background: #1A0A3B; color: #fff; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 0%, #7C3AED33 0%, transparent 60%), linear-gradient(180deg, #4A1A9E 0%, #1A0A3B 100%); z-index: 0; pointer-events: none; }
    .page { position: relative; z-index: 1; padding-bottom: 2rem; }

    /* TOPBAR */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem; }
    .room-badge { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 0.4rem 0.8rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 3px; color: var(--gold); }
    .logo-small { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: rgba(255,255,255,0.6); }
    .btn-exit { background: rgba(255,100,100,0.15); border: 1px solid rgba(255,100,100,0.3); border-radius: 10px; padding: 0.4rem 0.8rem; color: #FF6B6B; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 800; cursor: pointer; }
    .players-info { text-align: center; font-size: 0.75rem; color: #7B6FA0; font-weight: 700; padding: 0 1rem 0.5rem; }

    /* CURRENT NUMBER */
    .number-section { padding: 0.5rem 1rem; text-align: center; }
    .current-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #C4B0E8; margin-bottom: 0.4rem; }
    .current-number { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); display: inline-flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--text); box-shadow: 0 0 30px rgba(245,197,24,0.4); }
    .called-count { font-size: 0.72rem; color: #7B6FA0; font-weight: 700; margin-top: 0.4rem; }
    .recent-nums { display: flex; gap: 0.4rem; justify-content: center; flex-wrap: wrap; padding: 0.4rem 1rem; }
    .recent-num { width: 30px; height: 30px; border-radius: 50%; background: rgba(245,197,24,0.15); border: 1px solid rgba(245,197,24,0.3); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 0.8rem; color: var(--gold); }

    /* HOST CONTROLS */
    .host-area { padding: 0.5rem 1rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .btn-next { width: 100%; padding: 1rem; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--text); font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 800; cursor: pointer; box-shadow: 0 4px 16px rgba(245,197,24,0.3); }
    .btn-next:active { transform: scale(0.98); }
    .speed-row { display: flex; gap: 0.5rem; align-items: center; }
    .btn-pause { flex: 1; padding: 0.7rem; border-radius: 12px; border: 2px solid var(--card-border); background: var(--card-bg); color: #fff; font-family: 'Nunito', sans-serif; font-weight: 800; cursor: pointer; font-size: 0.9rem; }
    .timer-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin: 0 1rem; }
    .timer-fill { height: 100%; background: var(--gold); border-radius: 2px; width: 100%; }

    /* NUMBERS BOARD */
    .board-area { padding: 0.5rem 1rem; }
    .section-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #7B6FA0; margin-bottom: 0.4rem; }
    .board-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; }
    .board-cell { aspect-ratio: 1; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 0.7rem; background: rgba(255,255,255,0.06); color: #7B6FA0; transition: all 0.3s; }
    .board-cell.called { background: var(--gold); color: var(--text); }

    /* TICKETS */
    .ticket-area { padding: 0.5rem 1rem; }
    .ticket-tabs { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; }
    .ticket-tab { padding: 0.3rem 0.9rem; border-radius: 8px; border: 2px solid var(--card-border); background: transparent; color: #7B6FA0; font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 800; cursor: pointer; }
    .ticket-tab.active { border-color: var(--gold); color: var(--gold); background: rgba(245,197,24,0.1); }
    .ticket-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 0.8rem; display: none; }
    .ticket-card.show { display: block; }
    .ticket-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; }
    .tcell { aspect-ratio: 1; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; }
    .tcell.num { background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); transition: all 0.2s; }
    .tcell.blank { background: transparent; }
    .tcell.marked { background: #9B5EF5; color: #fff; box-shadow: 0 0 8px rgba(155,94,245,0.5); border-color: #9B5EF5; }
    .tcell.called-hi { background: rgba(245,197,24,0.2); color: var(--gold); border-color: rgba(245,197,24,0.5); animation: glow 1s ease infinite alternate; }
    @keyframes glow { from { box-shadow: 0 0 4px rgba(245,197,24,0.3); } to { box-shadow: 0 0 12px rgba(245,197,24,0.7); } }

    /* CLAIM & REACTIONS */
    .action-area { padding: 0.5rem 1rem; display: flex; gap: 0.6rem; }
    .btn-claim { flex: 1; padding: 0.9rem; border-radius: 14px; border: none; background: linear-gradient(135deg, #FF6B35, #FF4500); color: #fff; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; box-shadow: 0 4px 16px rgba(255,107,53,0.4); }
    .reactions { display: flex; gap: 0.4rem; }
    .rbtn { width: 44px; height: 44px; border-radius: 12px; border: 2px solid var(--card-border); background: var(--card-bg); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .rbtn:active { transform: scale(0.85); }

    /* WINNERS */
    .winners-area { padding: 0.5rem 1rem 1rem; }
    .winner-chip { display: flex; align-items: center; gap: 0.6rem; background: rgba(245,197,24,0.1); border: 1px solid rgba(245,197,24,0.25); border-radius: 10px; padding: 0.5rem 0.8rem; margin-bottom: 0.4rem; animation: popIn 0.3s ease; }
    .winner-pat { font-size: 0.7rem; color: var(--gold); font-weight: 800; }
    .winner-name { font-size: 0.85rem; font-weight: 800; }
    .no-winners { color: #7B6FA0; font-size: 0.82rem; }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* FLOATING REACTION */
    .float-reaction { position: fixed; font-size: 2rem; pointer-events: none; z-index: 999; animation: floatUp 1.5s ease forwards; }
    @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-150px) scale(1.5); opacity: 0; } }

    /* WINNER OVERLAY */
    .overlay { position: fixed; inset: 0; background: rgba(26,10,59,0.92); z-index: 100; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; text-align: center; padding: 2rem; backdrop-filter: blur(8px); }
    .overlay.show { display: flex; animation: fadeIn 0.4s ease; }
    .ov-emoji { font-size: 4rem; animation: bounce 0.8s ease infinite; }
    .ov-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--gold); letter-spacing: 2px; }
    .ov-name { font-size: 1.3rem; font-weight: 800; }
    .ov-pat { font-size: 1rem; color: #C4B0E8; font-weight: 700; }
    .btn-ok { padding: 0.9rem 2.5rem; border-radius: 14px; border: none; background: var(--gold); color: var(--text); font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 0.5rem; }

    /* RESULTS OVERLAY */
    .results-ov { position: fixed; inset: 0; background: rgba(26,10,59,0.96); z-index: 200; display: none; flex-direction: column; align-items: center; padding: 2rem 1.5rem; gap: 1rem; overflow-y: auto; backdrop-filter: blur(12px); }
    .results-ov.show { display: flex; animation: fadeIn 0.5s ease; }
    .res-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--gold); letter-spacing: 2px; }
    .res-winner-card { width: 100%; max-width: 400px; background: rgba(245,197,24,0.1); border: 2px solid rgba(245,197,24,0.3); border-radius: 14px; padding: 1rem; display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .res-name { font-size: 1.1rem; font-weight: 800; }
    .res-pat { font-size: 0.8rem; color: var(--gold); font-weight: 700; }
    .res-timer { font-size: 0.85rem; color: #7B6FA0; font-weight: 700; }
    .btn-play-again { width: 100%; max-width: 400px; padding: 1rem; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--text); font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; }
    .btn-end-room { width: 100%; max-width: 400px; padding: 1rem; border-radius: 14px; border: 2px solid rgba(255,255,255,0.15); background: transparent; color: #C4B0E8; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 0.5rem; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  </style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="room-badge" id="roomBadge">----</div>
    <div class="logo-small">🎱 HOUSIE</div>
    <button class="btn-exit" id="btnExit">✕ Exit</button>
  </div>

  <div class="players-info" id="playersInfo">0 players</div>

  <div class="number-section">
    <div class="current-label">Current Number</div>
    <div class="current-number" id="currentNum">--</div>
    <div class="called-count" id="calledCount">0 / 90 numbers called</div>
  </div>

  <div class="recent-nums" id="recentNums"></div>

  <!-- HOST ONLY -->
  <div id="hostArea" style="display:none">
    <div class="timer-bar" id="timerBar" style="display:none"><div class="timer-fill" id="timerFill"></div></div>
    <div class="host-area">
      <button class="btn-next" id="btnNext">🎱 Next Number</button>
      <div class="speed-row">
        <button class="btn-pause" id="btnPause">⏸️ Pause</button>
      </div>
    </div>
    <div class="board-area">
      <div class="section-label">All Numbers</div>
      <div class="board-grid" id="boardGrid"></div>
    </div>
    <div class="action-area">
      <div class="reactions">
        <button class="rbtn" data-e="🎉">🎉</button>
        <button class="rbtn" data-e="😱">😱</button>
        <button class="rbtn" data-e="🔥">🔥</button>
        <button class="rbtn" data-e="👑">👑</button>
      </div>
    </div>
  </div>

  <!-- PLAYER ONLY -->
  <div id="playerArea" style="display:none">
    <div class="ticket-area">
      <div class="ticket-tabs" id="ticketTabs"></div>
      <div id="ticketCards"></div>
    </div>
    <div class="action-area">
      <button class="btn-claim" id="btnClaim">🏆 Tambola!</button>
      <div class="reactions">
        <button class="rbtn" data-e="🎉">🎉</button>
        <button class="rbtn" data-e="😱">😱</button>
        <button class="rbtn" data-e="🔥">🔥</button>
      </div>
    </div>
  </div>

  <div class="winners-area">
    <div class="section-label">Winners So Far</div>
    <div id="winnersList"><div class="no-winners">No winners yet...</div></div>
  </div>

</div>

<!-- WINNER OVERLAY -->
<div class="overlay" id="winnerOverlay">
  <div class="ov-emoji">🏆</div>
  <div class="ov-title">WINNER!</div>
  <div class="ov-name" id="ovName"></div>
  <div class="ov-pat" id="ovPat"></div>
  <button class="btn-ok" id="btnOvOk">Continue Playing 🎱</button>
</div>

<!-- RESULTS OVERLAY -->
<div class="results-ov" id="resultsOv">
  <div style="font-size:3rem">🎊</div>
  <div class="res-title">Game Over!</div>
  <div id="resWinners"></div>
  <div class="res-timer" id="resTimer">Closing in 60s...</div>
  <div id="resBtns"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8FK8uA47FYgquE9XpNTAE5SM7iUAmrO8",
  authDomain: "housie-party.firebaseapp.com",
  databaseURL: "https://housie-party-default-rtdb.firebaseio.com",
  projectId: "housie-party",
  storageBucket: "housie-party.firebasestorage.app",
  messagingSenderId: "936166289642",
  appId: "1:936166289642:web:8b8bf76161a68058966793"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// URL params
const params = new URLSearchParams(location.search);
const roomCode = params.get('code') || '';
const role = params.get('role') || 'player';
const playerId = params.get('pid') || '';

const patternNames = {
  early5: '🎯 Early Five',
  topline: '⬆️ Top Line',
  midline: '➡️ Middle Line',
  botline: '⬇️ Bottom Line',
  fullhouse: '🏆 Full House'
};

let roomData = null;
let calledNumbers = [];
let winners = {};
let patterns = {};
let myTickets = [];
let myMarkedNumbers = [];
let markingMode = 'manual';
let autoTimer = null;
let isPaused = false;
let gameEnded = false;
let seenWinners = new Set();
let resCountdown = null;

// ── BOOT ──
if (!roomCode) {
  location.href = 'index.html';
} else {
  document.getElementById('roomBadge').textContent = roomCode;
  bootGame();
}

async function bootGame() {
  const snap = await get(ref(db, 'rooms/' + roomCode));
  if (!snap.exists()) {
    alert('Room not found!');
    location.href = 'index.html';
    return;
  }
  roomData = snap.val();
  patterns = roomData.patterns || {};
  calledNumbers = roomData.numbers || [];

  if (role === 'host') {
    setupHost();
  } else {
    setupPlayer();
  }

  listenUpdates();
}

// ── HOST SETUP ──
function setupHost() {
  document.getElementById('hostArea').style.display = 'block';

  // Build board
  const grid = document.getElementById('boardGrid');
  for (let i = 1; i <= 90; i++) {
    const c = document.createElement('div');
    c.className = 'board-cell' + (calledNumbers.includes(i) ? ' called' : '');
    c.textContent = i;
    c.id = 'bc' + i;
    grid.appendChild(c);
  }

  const isAuto = roomData.announceMode === 'auto';
  if (isAuto) {
    document.getElementById('timerBar').style.display = 'block';
    document.getElementById('btnNext').style.display = 'none';
    startAutoTimer();
  } else {
    document.getElementById('btnPause').style.display = 'none';
  }

  document.getElementById('btnNext').addEventListener('click', drawNumber);
  document.getElementById('btnPause').addEventListener('click', togglePause);

  updateNumberDisplay();
}

// ── PLAYER SETUP ──
function setupPlayer() {
  document.getElementById('playerArea').style.display = 'block';

  const players = roomData.players || {};
  const me = players[playerId];
  if (!me) {
    alert('Player data not found!');
    location.href = 'index.html';
    return;
  }

  myTickets = me.tickets || [];
  myMarkedNumbers = me.markedNumbers || [];
  markingMode = me.markingMode || 'manual';

  buildTickets();
  updateNumberDisplay();

  document.getElementById('btnClaim').addEventListener('click', claimWin);
}

// ── BUILD TICKETS ──
function buildTickets() {
  const tabs = document.getElementById('ticketTabs');
  const cards = document.getElementById('ticketCards');
  tabs.innerHTML = '';
  cards.innerHTML = '';

  myTickets.forEach((ticket, ti) => {
    if (myTickets.length > 1) {
      const tab = document.createElement('button');
      tab.className = 'ticket-tab' + (ti === 0 ? ' active' : '');
      tab.textContent = 'Ticket ' + (ti + 1);
      tab.addEventListener('click', () => switchTab(ti));
      tabs.appendChild(tab);
    }

    const card = document.createElement('div');
    card.className = 'ticket-card' + (ti === 0 ? ' show' : '');
    card.id = 'tcard' + ti;

    const grid = document.createElement('div');
    grid.className = 'ticket-grid';

    ticket.forEach((row, ri) => {
      row.forEach((num, ci) => {
        const cell = document.createElement('div');
        if (num === 0) {
          cell.className = 'tcell blank';
        } else {
          const isMarked = myMarkedNumbers.includes(num);
          const isCalled = calledNumbers.includes(num);
          cell.className = 'tcell num' + (isMarked ? ' marked' : isCalled ? ' called-hi' : '');
          cell.textContent = num;
          cell.dataset.num = num;
          if (markingMode === 'manual') {
            cell.addEventListener('click', () => markCell(num, cell));
          }
        }
        grid.appendChild(cell);
      });
    });

    card.appendChild(grid);
    cards.appendChild(card);
  });
}

function switchTab(i) {
  document.querySelectorAll('.ticket-tab').forEach((t, ti) => t.classList.toggle('active', ti === i));
  document.querySelectorAll('.ticket-card').forEach((c, ci) => c.classList.toggle('show', ci === i));
}

// ── MARK CELL ──
async function markCell(num, cell) {
  if (myMarkedNumbers.includes(num)) return;
  myMarkedNumbers.push(num);
  cell.classList.remove('called-hi');
  cell.classList.add('marked');
  await update(ref(db, 'rooms/' + roomCode + '/players/' + playerId), { markedNumbers: myMarkedNumbers });
}

// ── DRAW NUMBER ──
async function drawNumber() {
  if (gameEnded) return;
  const remaining = [];
  for (let i = 1; i <= 90; i++) {
    if (!calledNumbers.includes(i)) remaining.push(i);
  }
  if (remaining.length === 0) { triggerEnd(); return; }

  const num = remaining[Math.floor(Math.random() * remaining.length)];
  calledNumbers.push(num);
  await update(ref(db, 'rooms/' + roomCode), { numbers: calledNumbers });

  const bc = document.getElementById('bc' + num);
  if (bc) bc.classList.add('called');
  updateNumberDisplay();
  autoMarkPlayers(num);
  if (remaining.length === 1) triggerEnd();
}

async function autoMarkPlayers(num) {
  const snap = await get(ref(db, 'rooms/' + roomCode + '/players'));
  const players = snap.val() || {};
  for (const [pid, p] of Object.entries(players)) {
    if (p.markingMode !== 'auto') continue;
    let found = false;
    (p.tickets || []).forEach(t => t.forEach(r => { if (r.includes(num)) found = true; }));
    if (found) {
      const marked = p.markedNumbers || [];
      if (!marked.includes(num)) {
        marked.push(num);
        await update(ref(db, 'rooms/' + roomCode + '/players/' + pid), { markedNumbers: marked });
      }
    }
  }
}

// ── AUTO TIMER ──
function startAutoTimer() {
  if (isPaused || gameEnded) return;
  const dur = roomData.speed || 5000;
  const fill = document.getElementById('timerFill');
  fill.style.transition = 'none';
  fill.style.width = '100%';
  setTimeout(() => {
    fill.style.transition = 'width ' + dur + 'ms linear';
    fill.style.width = '0%';
  }, 50);
  autoTimer = setTimeout(() => {
    drawNumber();
    if (!gameEnded && !isPaused) startAutoTimer();
  }, dur);
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('btnPause').textContent = isPaused ? '▶️ Resume' : '⏸️ Pause';
  if (!isPaused) startAutoTimer();
  else {
    clearTimeout(autoTimer);
    const fill = document.getElementById('timerFill');
    fill.style.transition = 'none';
  }
}

// ── UPDATE DISPLAY ──
function updateNumberDisplay() {
  const last = calledNumbers[calledNumbers.length - 1];
  document.getElementById('currentNum').textContent = last || '--';
  document.getElementById('calledCount').textContent = calledNumbers.length + ' / 90 numbers called';
  const recent = calledNumbers.slice(-6, -1).reverse();
  document.getElementById('recentNums').innerHTML = recent.map(n => '<div class="recent-num">' + n + '</div>').join('');
}

// ── LISTEN UPDATES ──
function listenUpdates() {
  // Numbers
  onValue(ref(db, 'rooms/' + roomCode + '/numbers'), snap => {
    const nums = snap.val() || [];
    calledNumbers = nums;
    updateNumberDisplay();

    if (role === 'host') {
      document.querySelectorAll('.board-cell').forEach(c => {
        const n = parseInt(c.textContent);
        c.classList.toggle('called', nums.includes(n));
      });
    }

    if (role === 'player') {
      if (markingMode === 'auto') {
        nums.forEach(n => { if (!myMarkedNumbers.includes(n)) myMarkedNumbers.push(n); });
      }
      document.querySelectorAll('.tcell.num').forEach(cell => {
        const n = parseInt(cell.dataset.num);
        const isMarked = myMarkedNumbers.includes(n);
        const isCalled = nums.includes(n);
        cell.className = 'tcell num' + (isMarked ? ' marked' : isCalled ? ' called-hi' : '');
      });
    }
  });

  // Players count
  onValue(ref(db, 'rooms/' + roomCode + '/players'), snap => {
    const count = Object.keys(snap.val() || {}).length;
    document.getElementById('playersInfo').textContent = count + ' player' + (count !== 1 ? 's' : '');
  });

  // Winners
  onValue(ref(db, 'rooms/' + roomCode + '/winners'), snap => {
    winners = snap.val() || {};
    renderWinners();
  });

  // Reactions
  onValue(ref(db, 'rooms/' + roomCode + '/reactions'), snap => {
    const r = snap.val();
    if (r) floatReaction(r.emoji);
  });

  // Status
  onValue(ref(db, 'rooms/' + roomCode + '/status'), snap => {
    const s = snap.val();
    if (s === 'ended' && !gameEnded) {
      gameEnded = true;
      clearTimeout(autoTimer);
      showResults();
    }
  });
}

// ── WINNERS ──
function renderWinners() {
  const list = document.getElementById('winnersList');
  const entries = Object.entries(winners);
  if (entries.length === 0) {
    list.innerHTML = '<div class="no-winners">No winners yet...</div>';
    return;
  }
  list.innerHTML = entries.map(([pat, w]) =>
    '<div class="winner-chip"><span>🏆</span><div><div class="winner-pat">' + (patternNames[pat] || pat) + '</div><div class="winner-name">' + w.name + '</div></div></div>'
  ).join('');

  entries.forEach(([pat, w]) => {
    if (!seenWinners.has(pat)) {
      seenWinners.add(pat);
      showWinnerOverlay(w.name, patternNames[pat] || pat);
    }
  });
}

function showWinnerOverlay(name, pat) {
  document.getElementById('ovName').textContent = name;
  document.getElementById('ovPat').textContent = pat;
  document.getElementById('winnerOverlay').classList.add('show');
}

document.getElementById('btnOvOk').addEventListener('click', () => {
  document.getElementById('winnerOverlay').classList.remove('show');
});

// ── CLAIM WIN ──
async function claimWin() {
  const snap = await get(ref(db, 'rooms/' + roomCode + '/players/' + playerId));
  const me = snap.val();
  if (!me) return;

  const numsSnap = await get(ref(db, 'rooms/' + roomCode + '/numbers'));
  const called = numsSnap.val() || [];
  const winSnap = await get(ref(db, 'rooms/' + roomCode + '/winners'));
  const existingW = winSnap.val() || {};

  const marked = me.markedNumbers || [];
  const tickets = me.tickets || [];

  let claimedPat = null;

  const checks = {
    early5: () => !existingW.early5 && patterns.early5 && marked.filter(n => called.includes(n)).length >= 5,
    topline: () => !existingW.topline && patterns.topline && tickets.some(t => t[0].filter(n => n > 0).every(n => marked.includes(n) && called.includes(n))),
    midline: () => !existingW.midline && patterns.midline && tickets.some(t => t[1].filter(n => n > 0).every(n => marked.includes(n) && called.includes(n))),
    botline: () => !existingW.botline && patterns.botline && tickets.some(t => t[2].filter(n => n > 0).every(n => marked.includes(n) && called.includes(n))),
    fullhouse: () => !existingW.fullhouse && patterns.fullhouse && tickets.some(t => t.flat().filter(n => n > 0).every(n => marked.includes(n) && called.includes(n)))
  };

  for (const [pat, check] of Object.entries(checks)) {
    if (check()) { claimedPat = pat; break; }
  }

  if (!claimedPat) {
    const btn = document.getElementById('btnClaim');
    btn.style.animation = 'shake 0.4s ease';
    btn.textContent = '❌ Not valid!';
    setTimeout(() => { btn.style.animation = ''; btn.textContent = '🏆 Tambola!'; }, 1500);
    return;
  }

  await update(ref(db, 'rooms/' + roomCode + '/winners/' + claimedPat), {
    name: me.name, playerId, pattern: claimedPat, timestamp: Date.now()
  });

  // Check all patterns won
  const updSnap = await get(ref(db, 'rooms/' + roomCode + '/winners'));
  const updW = updSnap.val() || {};
  const active = Object.keys(patterns).filter(k => patterns[k]);
  if (active.every(p => updW[p])) {
    await update(ref(db, 'rooms/' + roomCode), { status: 'ended' });
  }
}

// ── REACTIONS ──
document.querySelectorAll('.rbtn').forEach(btn => {
  btn.addEventListener('click', async () => {
    await set(ref(db, 'rooms/' + roomCode + '/reactions'), { emoji: btn.dataset.e, ts: Date.now() });
  });
});

function floatReaction(emoji) {
  const el = document.createElement('div');
  el.className = 'float-reaction';
  el.textContent = emoji;
  el.style.left = (20 + Math.random() * 60) + 'vw';
  el.style.bottom = '20vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

// ── END / RESULTS ──
async function triggerEnd() {
  if (gameEnded) return;
  gameEnded = true;
  clearTimeout(autoTimer);
  await update(ref(db, 'rooms/' + roomCode), { status: 'ended' });
  showResults();
}

function showResults() {
  clearTimeout(autoTimer);
  const ov = document.getElementById('resultsOv');
  ov.classList.add('show');

  const entries = Object.entries(winners);
  document.getElementById('resWinners').innerHTML = entries.length === 0
    ? '<div style="color:#7B6FA0">No winners this round!</div>'
    : entries.map(([pat, w]) =>
        '<div class="res-winner-card"><div style="font-size:2rem">🏆</div><div><div class="res-name">' + w.name + '</div><div class="res-pat">' + (patternNames[pat] || pat) + '</div></div></div>'
      ).join('');

  const btns = document.getElementById('resBtns');
  if (role === 'host') {
    btns.innerHTML = '';
    const pa = document.createElement('button');
    pa.className = 'btn-play-again';
    pa.textContent = '🔄 Play Again';
    pa.addEventListener('click', playAgain);
    const er = document.createElement('button');
    er.className = 'btn-end-room';
    er.textContent = '🚪 End Room';
    er.addEventListener('click', endRoom);
    btns.appendChild(pa);
    btns.appendChild(er);
  } else {
    btns.innerHTML = '<div style="color:#7B6FA0;font-size:0.85rem">Waiting for host...</div>';
  }

  let secs = 60;
  const timerEl = document.getElementById('resTimer');
  resCountdown = setInterval(() => {
    secs--;
    timerEl.textContent = 'Closing in ' + secs + 's...';
    if (secs <= 0) {
      clearInterval(resCountdown);
      if (role === 'host') endRoom();
      else location.href = 'index.html';
    }
  }, 1000);
}

async function playAgain() {
  clearInterval(resCountdown);
  await update(ref(db, 'rooms/' + roomCode), { status: 'waiting', numbers: [], winners: {} });
  const snap = await get(ref(db, 'rooms/' + roomCode + '/players'));
  const players = snap.val() || {};
  for (const pid of Object.keys(players)) {
    await update(ref(db, 'rooms/' + roomCode + '/players/' + pid), { markedNumbers: [] });
  }
  location.href = 'host.html';
}

async function endRoom() {
  clearInterval(resCountdown);
  await remove(ref(db, 'rooms/' + roomCode));
  location.href = 'index.html';
}

// ── EXIT BUTTON ──
document.getElementById('btnExit').addEventListener('click', async () => {
  if (role === 'host') {
    if (!confirm('End game for everyone?')) return;
    await remove(ref(db, 'rooms/' + roomCode));
    location.href = 'index.html';
  } else {
    if (!confirm('Leave the game?')) return;
    await remove(ref(db, 'rooms/' + roomCode + '/players/' + playerId));
    location.href = 'index.html';
  }
});

</script>
